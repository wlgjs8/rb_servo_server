services:
  rb_servo_server:
    build:
      context: .
      dockerfile: docker/rb_servo_server.Dockerfile
      target: build
    image: rb_servo_server:dev
    command: ["./build/rb_servo_server", "--config", "config/dual_mock_compose.yaml"]
    init: true
    networks: [rb_servo_net]
    depends_on:
      rb_servo_gui:
        condition: service_started
    ports:
      - "50010:50010/udp"
    volumes:
      - ./logs:/workspace/logs

  rb_servo_gui:
    build:
      context: .
      dockerfile: docker/rb_servo_gui.Dockerfile
    image: rb_servo_gui:dev
    init: true
    networks: [rb_servo_net]
    environment:
      RB_GUI_HOST: "0.0.0.0"
      RB_GUI_PORT: "8080"
      RB_GUI_STATE_BIND: "0.0.0.0"
      RB_GUI_STATE_PORT: "50110"
      RB_GUI_COMMAND_HOST: "rb_servo_server"
      RB_GUI_COMMAND_PORT: "50010"
      RB_GUI_OBSERVED_MODE: "mock"
      RB_GUI_OPS_AVAILABLE: "0"
    ports:
      - "8080:8080/tcp"
      - "50110:50110/udp"

  rb_sim:
    profiles: ["sim"]
    image: alpine:3.20
    command: ["sh", "-c", "echo 'No-Go: simulator assets/backend readiness not bundled in scaffold'; sleep infinity"]
    networks: [rb_servo_net]
    labels:
      rb-servo.role: "simulator-placeholder"
      rb-servo.readiness: "no-go-until-rbpodo-rbsim-tests-pass"

networks:
  rb_servo_net:
    driver: bridge
